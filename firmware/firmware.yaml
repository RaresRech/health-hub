    optimistic: true
    options:
      - "Automatic"
      - "Predefined Color"
      - "Custom Color"
    initial_option: "Automatic"
    set_action:
      - lambda: |-
          if (x == "Automatic") id(led_behavior_mode) = 0;
          else if (x == "Predefined Color") id(led_behavior_mode) = 1;
          else if (x == "Custom Color") id(led_behavior_mode) = 2;

  - platform: template
    id: led_predefined_select
    name: "NeoPixel Predefined Color"
    optimistic: true
    options:
      - "Orange"
      - "Blue"
      - "Warm White"
      - "Green"
      - "Purple"
      - "Dust Gold"
    initial_option: "Orange"
    set_action:
      - lambda: |-
          if (x == "Orange") id(led_predefined_color) = 0;
          else if (x == "Blue") id(led_predefined_color) = 1;
          else if (x == "Warm White") id(led_predefined_color) = 2;
          else if (x == "Green") id(led_predefined_color) = 3;
          else if (x == "Purple") id(led_predefined_color) = 4;
          else if (x == "Dust Gold") id(led_predefined_color) = 5;

