  friendly_name: IOT

  on_boot:
    priority: 600
    then:
      - delay: 200ms
      - light.turn_on:
          id: knob_ring
          brightness: ${led_boot_brightness}
          red: ${led_boot_r}
          green: ${led_boot_g}
          blue: ${led_boot_b}

