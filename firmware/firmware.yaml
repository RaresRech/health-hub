mqtt:
  id: mqtt_client
  broker: 10.241.116.69
  port: 1883
  username: ""
  password: ""
  topic_prefix: iot
  reboot_timeout: 0s
  publish_nan_as_none: true
  discover_ip: true
  discovery: true

  birth_message:
    topic: iot/status
    payload: online

  will_message:
    topic: iot/status
    payload: offline

  on_connect:
    then:
      - logger.log: "MQTT Connected"

  on_disconnect:
    then:
      - logger.log: "MQTT Disconnected"

  on_message:
    - topic: iot/cmd/target_temp/set
      then:
        - lambda: |-
            float v = atof(x.c_str());
            if (v < 10.0f) v = 10.0f;
            if (v > 30.0f) v = 30.0f;
            id(target_temp) = v;
            id(last_ui_ms) = millis();

    - topic: iot/cmd/light/set
      then:
        - lambda: |-
            if (x == "ON" || x == "on" || x == "1") {
              id(light_relay).turn_on();
            } else {
              id(light_relay).turn_off();
            }

    - topic: iot/cmd/page/set
      then:
        - lambda: |-
            int p = atoi(x.c_str());
            if (p < 0) p = 0;
            if (p > 9) p = 9;
            id(ui_page) = p;
            id(edit_mode) = 0;
            id(gauge_to_page) = id(ui_page);
            id(gauge_animating) = true;
            id(gauge_anim_start) = millis();
            id(last_ui_ms) = millis();

