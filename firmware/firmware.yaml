  tx_pin: GPIO1
  rx_pin: GPIO3
  baud_rate: 115200

globals:
  - id: standby_since_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

  - id: standby_active
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: gauge_animating
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: gauge_anim_start
    type: uint32_t
    restore_value: no
    initial_value: '0'

  - id: gauge_to_page
    type: int
    restore_value: no
    initial_value: '0'

  - id: target_temp
    type: float
    restore_value: yes
    initial_value: '22.0'

  - id: hysteresis
    type: float
    restore_value: yes
    initial_value: '0.5'

  # 0 thermostat
  # 1 room temp
  # 2 humidity
  # 3 pressure
  # 4 dust
  # 5 light control
  # 6 distance
  # 7 gas
  # 8 settings
  # 9 digital clock
  - id: ui_page
    type: int
    restore_value: no
    initial_value: '0'

  # 0 browsing
  # 1 editing current page value
  - id: edit_mode
    type: int
    restore_value: no
    initial_value: '0'

  # 0 off, 1 on while editing light page
  - id: light_edit_state
    type: int
    restore_value: no
    initial_value: '0'

  - id: last_ui_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

  - id: light_auto_off_sent
    type: bool
    restore_value: no
    initial_value: 'false'

  # 0 automatic page colors
  # 1 predefined color
  # 2 custom RGB color
  - id: led_behavior_mode
    type: int
    restore_value: yes
    initial_value: '0'

  # 0 orange, 1 blue, 2 warm white, 3 green, 4 purple, 5 dust gold
  - id: led_predefined_color
    type: int
    restore_value: yes
    initial_value: '0'

  - id: led_custom_r
    type: float
    restore_value: yes
    initial_value: '80.0'

  - id: led_custom_g
    type: float
    restore_value: yes
    initial_value: '255.0'

  - id: led_custom_b
    type: float
    restore_value: yes
    initial_value: '120.0'

  - id: led_custom_brightness
    type: float
    restore_value: yes
    initial_value: '0.25'

output:
  - platform: gpio
